<div class="global-search-container">
  <div class="global-search-title-container">
    <h2>Global Search Results</h2>
    <div class="global-search-title-right-button-container">
      <app-page-help-button></app-page-help-button>
    </div>
  </div>

  @if(aiResponse) {
    <h3>Response from AI:</h3>
    <!-- <pre>{{ aiResponse.choices[0].message.content }}</pre> -->
     <div class="ai-response-container" [innerHtml]="aiResponse.choices[0].message.content"></div>
  } @else {
    <div class="loader"></div>
  }

  <div class="global-search-data-container">
    <app-table visibleColumnStorageKey="global-search" defaultSortField="Name" [tableCols]="tableCols" reportStyle="neutral" exportName="Global Search" tableType="globalSearch" (rowClickEvent)="onRowClick($event)"></app-table>
  </div>
</div>
